x-db-common: &db-common
  image: postgres:16.1
  restart: unless-stopped

services:
  stats-db:
    <<: *db-common
    container_name: stats-db
    environment:
      POSTGRES_DB: ewm-stats
      POSTGRES_USER: stat
      POSTGRES_PASSWORD: stat
    ports:
      - "5433:5432"
    volumes:
      - stats-db-data:/var/lib/postgresql/data

  event-db:
    <<: *db-common
    container_name: event-db
    environment:
      POSTGRES_DB: event-db
      POSTGRES_USER: event
      POSTGRES_PASSWORD: event
    ports:
      - "5434:5432"
    volumes:
      - event-db-data:/var/lib/postgresql/data

  user-db:
    <<: *db-common
    container_name: user-db
    environment:
      POSTGRES_DB: user-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5435:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data

  request-db:
    <<: *db-common
    container_name: request-db
    environment:
      POSTGRES_DB: request-db
      POSTGRES_USER: request
      POSTGRES_PASSWORD: request
    ports:
      - "5436:5432"
    volumes:
      - request-db-data:/var/lib/postgresql/data

  comment-db:
    <<: *db-common
    container_name: comment-db
    environment:
      POSTGRES_DB: comment-db
      POSTGRES_USER: comment
      POSTGRES_PASSWORD: comment
    ports:
      - "5437:5432"
    volumes:
      - comment-db-data:/var/lib/postgresql/data

  analyzer-db:
    <<: *db-common
    container_name: analyzer-db
    environment:
      POSTGRES_DB: analyzer-db
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: analyzer
    ports:
      - "5438:5432"
    volumes:
      - analyzer-db-data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  kafka-init-topics:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init-topics
    depends_on:
      - kafka
    command: >
      bash -c "
        sleep 10 &&
        kafka-topics --create --topic stats.user-actions.v1 --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists &&
        kafka-topics --create --topic stats.events-similarity.v1 --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --if-not-exists
      "

volumes:
  stats-db-data:
  event-db-data:
  user-db-data:
  request-db-data:
  comment-db-data:
  analyzer-db-data: