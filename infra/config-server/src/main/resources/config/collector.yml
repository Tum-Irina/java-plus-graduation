server:
  port: 0

spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: ru.practicum.kafka.serializer.AvroSerializer

stats:
  kafka:
    topics:
      user-actions: stats.user-actions.v1

grpc:
  server:
    port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    ru.practicum: DEBUG
    org.springframework.kafka: INFO