server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        # Запросы к заявкам
        - id: request-service-route
          uri: lb://request-service
          predicates:
            - Path=/users/*/events/*/requests, /users/*/requests, /users/*/requests/*/cancel
          filters:
            - StripPrefix=0

        # Запросы к комментариям пользователя
        - id: comment-service-route
          uri: lb://comment-service
          predicates:
            - Path=/users/*/comments/**, /admin/comments/**, /comments/**
          filters:
            - StripPrefix=0

        # Запросы к событиям пользователя
        - id: user-events-route
          uri: lb://event-service
          predicates:
            - Path=/users/*/events/**
          filters:
            - StripPrefix=0

        # Администрирование пользователей
        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
          filters:
            - StripPrefix=0

        # Администрирование подборок
        - id: admin-compilations-route
          uri: lb://event-service
          predicates:
            - Path=/admin/compilations/**
          filters:
            - StripPrefix=0

        # Администрирование категорий
        - id: admin-categories-route
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**
          filters:
            - StripPrefix=0

        # Администрирование событий
        - id: admin-events-route
          uri: lb://event-service
          predicates:
            - Path=/admin/events/**
          filters:
            - StripPrefix=0

        # Публичные подборки
        - id: compilations-route
          uri: lb://event-service
          predicates:
            - Path=/compilations/**
          filters:
            - StripPrefix=0

        # Публичные категории
        - id: categories-route
          uri: lb://event-service
          predicates:
            - Path=/categories/**
          filters:
            - StripPrefix=0

        # Публичные эндпоинты событий
        - id: event-service-route
          uri: lb://event-service
          predicates:
            - Path=/events/**
          filters:
            - name: Retry
              args:
                retries: 3
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - BAD_GATEWAY
                  - SERVICE_UNAVAILABLE
                methods: GET
                exceptions:
                  - java.net.ConnectException
                  - org.springframework.web.client.ResourceAccessException

        # Статистика
        - id: stats-server-route
          uri: lb://stats-server
          predicates:
            - Path=/hit, /stats
          filters:
            - name: Retry
              args:
                retries: 3
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - SERVICE_UNAVAILABLE
                methods: GET,POST

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    ru.practicum: DEBUG
    org.springframework.cloud.gateway: DEBUG